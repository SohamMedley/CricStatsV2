<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricStats</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>
    <div class="mobile-container">
        <!-- Top Navigation Layer with Leather Ball & Bat Vector Brand Icon Asset -->
        <div class="top-nav">
            <div class="logo-btn" onclick="window.location.href='/login'">
                <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Premium Geometric Leather Ball Base -->
                    <circle cx="45" cy="55" r="32" fill="#FFFFFF" stroke="#E5E5EA" stroke-width="2.5"/>
                    <path d="M45 23 C33 38 33 72 45 87" stroke="#FF334B" stroke-width="2" stroke-dasharray="2 2"/>
                    <path d="M45 23 C57 38 57 72 45 87" stroke="#FF334B" stroke-width="2" stroke-dasharray="2 2"/>
                    
                    <!-- Overlapping Angled Flat-Face Cricket Bat Layer -->
                    <g transform="rotate(25 50 50)">
                        <!-- Handle Grip -->
                        <rect x="76" y="20" width="6" height="24" rx="2" fill="#798094" stroke="#FFFFFF" stroke-width="1.5"/>
                        <!-- Wooden Blade Base Structure -->
                        <rect x="72" y="44" width="14" height="42" rx="1" fill="#FFFFFF" stroke="#0A54FF" stroke-width="2"/>
                        <!-- Surface Woodgrain Highlights -->
                        <line x1="77" y1="48" x2="77" y2="80" stroke="#798094" stroke-width="1" opacity="0.3"/>
                        <line x1="81" y1="48" x2="81" y2="80" stroke="#798094" stroke-width="1" opacity="0.3"/>
                    </g>
                    <!-- Core Lighting Gloss Highlights -->
                    <circle cx="32" cy="42" r="6" fill="#FFFFFF" opacity="0.5" filter="blur(0.5px)"/>
                </svg>
                <span class="logo-text" style="letter-spacing: 0.25em; margin-left: 4px;">Cricket Analytics</span>
            </div>
        </div>

        <!-- High-Impact Editorial Billboard Box -->
        <div class="score-header-box">
            <h2></h2>
            <h1>CRIC<br>STATS</h1>
            <p>Production Engine Active</p>
        </div>

        <!-- Componentized Main Layout Stack -->
        <div class="bento-stack">
            <!-- Spectator Pin Entry Panel Card -->
            <div class="bento-card full-width">
                <span class="card-label">Spectator Portal</span>
                <input type="text" id="matchCodeInput" placeholder="ENTER 6-DIGIT MATCH PIN (EX: A7B89X)">
                <button onclick="viewMatchSpectator()">VIEW LIVE SCORECARD</button>
            </div>
        </div>
    </div>

    <script src="/frontend/js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CricStats</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>
    <div class="mobile-container">
        <!-- Top Navigation Header -->
        <div class="page-header">
            <h2 class="page-title">Admin Login</h2>
            <button class="nav-back-btn" onclick="window.location.href='/'">GATEWAY</button>
        </div>
        
        <!-- Componentized Form Layout Stack -->
        <div class="bento-stack">
            <div class="bento-card full-width">
                <span class="card-label">Administrative Access</span>
                
                <span class="card-sub-label">Select Profile</span>
                <select id="adminUser">
                    <option value="Admin1">Admin 1</option>
                    <option value="Admin2">Admin 2</option>
                </select>

                <span class="card-sub-label">Secure Access Key</span>
                <input type="password" id="adminPassword" placeholder="••••••••">

                <button onclick="executeAdminLogin()">AUTHORIZE ACCESS</button>
            </div>
        </div>
    </div>
    <script src="/frontend/js/script.js"></script>
</body>
</html>

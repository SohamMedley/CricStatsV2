<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detailed Scorecard - CricStats</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>
<body>
    <div class="mobile-container">
        <!-- Top Navigation Header Component Layer -->
        <div class="page-header">
            <h2 class="page-title">Full Scorecard</h2>
            {% if admin_view %}
                {% if match_status == 'live' or match_status == 'inn1_completed' %}
                <button class="nav-back-btn" onclick="window.location.href='/scorecard/{{match_code}}'">RESUME</button>
                {% else %}
                <button class="nav-back-btn" onclick="window.location.href='/home'">DASHBOARD</button>
                {% endif %}
            {% else %}
                <!-- Spectator explicitly gets a back button to live tracking in the top header -->
                <button class="nav-back-btn" onclick="window.location.href='/scorecard/{{match_code}}'">← BACK</button>
            {% endif %}
        </div>

        <!-- Dynamic Match Outcome Banner Managed by Script -->
        <div id="matchWinnerBanner" class="score-header-box" style="display: none;"></div>

        <!-- Central Operational Layout Stack for Analytics and Tables -->
        <div id="detailedOutputArea" class="bento-stack">
            <!-- Data tables, economy rates, and logs rendered dynamically via script.js -->
        </div>

        <!-- Bottom Navigation Control Deck Footer -->
        {% if admin_view %}
        <div class="control-deck-footer">
            <button class="secondary" onclick="window.location.href='/home'">Return to Dashboard</button>
            
            {% if match_status == 'live' or match_status == 'inn1_completed' %}
            <button onclick="window.location.href='/scorecard/{{match_code}}'" style="background: var(--cobalt-core); color: var(--text-pure);">Resume Game</button>
            {% else %}
            <button onclick="window.location.href='/home'">Dashboard Main</button>
            {% endif %}
        </div>
        {% else %}
        <!-- Clean Spectator Layout Control Deck without Dashboard access -->
        <div class="control-deck-footer" style="grid-template-columns: 1fr;">
            <button class="btn-full-width" style="background: var(--cobalt-core); color: var(--text-pure); margin-top: 0;" onclick="window.location.href='/scorecard/{{match_code}}'">← BACK TO LIVE SCORECARD</button>
        </div>
        {% endif %}
    </div>
    <script src="/frontend/js/script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderDetailedStatisticsView("{{match_code}}");
        });
    </script>
</body>
</html>

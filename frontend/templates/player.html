<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster Vault - CricStats</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <style>
        /* Sticky Form Actions Layout Configuration Override */
        .sticky-action-bar {
            position: -webkit-sticky;
            position: sticky;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: var(--border-hairline);
            padding: 16px 0;
            z-index: 100;
            margin-top: auto;
        }
        .scrollable-feed-pane {
            flex: 1;
            overflow-y: auto;
            max-height: calc(100vh - 280px);
            padding-right: 4px;
        }
        .scrollable-feed-pane::-webkit-scrollbar {
            width: 3px;
        }
        .scrollable-feed-pane::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-pill);
        }
    </style>
</head>
<body>
    <div id="feedbackToast" class="feedback-toast-banner"></div>

    <div class="mobile-container" style="display: flex; flex-direction: column; height: 100vh; overflow: hidden;">
        <div class="page-header">
            <h2 class="page-title">Roster Vault</h2>
            <button class="nav-back-btn" onclick="window.location.href='/home'">DASHBOARD</button>
        </div>

        <div class="pool-search-container">
            <input type="text" id="playerSearchBar" oninput="filterPlayerRosterFeed()" placeholder="Search registered profiles...">
        </div>

        <!-- Scrollable Feed View Layer Area -->
        <div id="playerListContainer" class="scrollable-feed-pane bento-stack">
            <div class="empty-state-text">Loading recorded profiles...</div>
        </div>

        <!-- Sticky Static Create Action Container Box -->
        <div class="sticky-action-bar" id="actionContainer">
            <button class="btn-full-width" onclick="togglePlayerModal(true)">+ ADD NEW PROFILE</button>
        </div>
    </div>

    <!-- Creation Dialog Modal Workspace Layer -->
    <div id="playerModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Register Profile</h3>
            <span class="card-sub-label">Full Profile Label Name:</span>
            <input type="text" id="pName" placeholder="Ex: Virat Kohli">
            
            <span class="card-sub-label">Operational Role:</span>
            <select id="pRole">
                <option value="Batsman">Batsman</option>
                <option value="Bowler">Bowler</option>
                <option value="All-rounder">All-rounder</option>
                <option value="Wicketkeeper">Wicketkeeper</option>
            </select>

            <span class="card-sub-label">Hand Dominance Configuration:</span>
            <select id="pHand">
                <option value="Right-handed">Right-handed</option>
                <option value="Left-handed">Left-handed</option>
            </select>

            <div class="control-deck-footer">
                <button class="secondary" onclick="togglePlayerModal(false)">Cancel</button>
                <button onclick="savePlayerProfile()">Commit</button>
            </div>
        </div>
    </div>

    <script src="/frontend/js/script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadPlayerRoster();
        });
    </script>
</body>
</html>
